<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Business Network Blueprint</title>
    <meta
      name="description"
      content="Multi-source income blueprint from trading, hospitality, and farming."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./assets/css/styles.css" />
  </head>
  <body>
    <header class="header wrapper">
      <div class="header-row">
        <div>
          <h1 id="title">Business Network Blueprint</h1>
          <p id="subtitle" class="subtitle"></p>
        </div>
        <div class="top-actions">
          <a class="button button-ghost" href="./scale.html">Full Scale Plan</a>
          <a class="button button-ghost" href="./city-plan.html">City Planner</a>
          <button id="logout" type="button">Logout</button>
        </div>
      </div>
    </header>

    <main class="wrapper">
      <section>
        <h2>Income Engines</h2>
        <div id="tracks" class="grid"></div>
      </section>

      <section>
        <h2>Network Map</h2>
        <div id="network" class="network-grid"></div>
      </section>

      <section>
        <h2>12-Month Scale Plan</h2>
        <div id="milestones" class="timeline"></div>
      </section>

      <section>
        <h2>Priority Assets</h2>
        <div class="card">
          <ul id="resources"></ul>
        </div>
      </section>

      <section>
        <h2>Execution Rules</h2>
        <div class="card">
          <ul id="rules" class="rule-list"></ul>
        </div>
      </section>
    </main>

    <footer class="wrapper">Private plan dashboard with client-side password gate.</footer>

    <script src="./assets/js/auth.js"></script>
    <script>
      window.roadmapAuth.requireAuth();
    </script>
    <script src="./assets/js/roadmap.js"></script>
    <script src="./assets/js/app.js"></script>
  </body>
</html>
