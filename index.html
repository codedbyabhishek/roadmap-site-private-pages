<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blank Project</title>
    <meta name="description" content="Blank starter project hosted on GitHub Pages." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./assets/css/styles.css" />
  </head>
  <body>
    <header class="header wrapper">
      <div class="header-row">
        <div>
          <h1>Blank Project</h1>
          <p class="subtitle">This workspace is now reset and ready for new content.</p>
        </div>
        <button id="logout" type="button">Logout</button>
      </div>

    <main class="wrapper">
      <section>
        <div class="card">
          <h2>Start Here</h2>
          <p>Replace this section with your new project content.</p>
        </div>
      </section>
    </main>

    <footer class="wrapper">Blank starter with login gate.</footer>

    <script src="./assets/js/auth.js"></script>
    <script>
      window.roadmapAuth.requireAuth();
    </script>
    <script src="./assets/js/app.js"></script>
